<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jura:wght@300..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Mouse Circle -->
    <div class="mouse-circle"></div>
    <div class="mouse-dot"></div>
    <!-- End of Mouse Circle -->

    <!-- Page Container-->
    <div class="container">
      <!-- Page BG -->
      <div class="page-bg"></div>
      <!-- End of Page BG -->

      <!-- Section 1-->
      <section class="section-1 center">
        <a class="logo" href="#">Nick Brown</a>
        <div class="circles">
          <div class="circle circle-1"></div>
          <div class="circle circle-2"></div>
          <div class="circle circle-3"></div>
          <div class="circle circle-4"></div>
        </div>
        <div class="main-circle center">
          <img src="images/landing/designer.jpg" />
        </div>
        <h4 class="featured-text featured-text-1">Creative</h4>
        <h4 class="featured-text featured-text-2">Design</h4>

        <a href="#" class="main-btn">
          <div class="main-btn-content center">
            <div class="main-btn-line"></div>
            <div class="main-btn-line"></div>
            <div class="main-btn-line"></div>
            <span>Projects</span>
          </div>
        </a>
      </section>
      <!-- End of Section 1-->

      <!-- About -->
      <section class="about">
        <h1 class="about-heading">About Me</h1>
        <p class="about-me-text"></p>
        <a href="#" class="main-btn">
          <div class="main-btn-content center">
            <div class="main-btn-line"></div>
            <div class="main-btn-line"></div>
            <div class="main-btn-line"></div>
            <span>Let's Talk</span>
          </div>
        </a>
      </section>
      <!-- End of About -->

      <!-- Projects -->
      <section class="section-projects">
        <h1 class="projects-heading">My Work</h1>
        <div class="projects center">
          <div class="project">
            <img src="images/projects/project-1.jpg" />
          </div>
          <div class="project">
            <img src="images/projects/project-2.jpg" />
          </div>
          <div class="project">
            <img src="images/projects/project-3.jpg" />
          </div>
          <div class="project">
            <img src="images/projects/project-4.jpg" />
          </div>
          <div class="project">
            <img src="images/projects/project-5.jpg" />
          </div>
          <div class="project">
            <img src="images/projects/project-6.jpg" />
          </div>
          <div class="project">
            <img src="images/projects/project-7.jpg" />
          </div>
          <div class="project">
            <img src="images/projects/project-8.jpg" />
          </div>
          <div class="project">
            <img src="images/projects/project-9.jpg" />
          </div>
          <div class="project">
            <img src="images/projects/project-10.jpg" />
          </div>
        </div>
        <button class="project-hide-btn">&laquo;Close</button>

        <a href="#" class="main-btn projects-btn">
          <div class="main-btn-content center">
            <div class="main-btn-line"></div>
            <div class="main-btn-line"></div>
            <div class="main-btn-line"></div>
            <span>Show More</span>
          </div>
        </a>
      </section>
      <!-- End of Projects -->
    </div>
    <!-- End of Page Container-->

    <script src="script.js"></script>
  </body>
</html>
